name: Build RT Kernel for S905L3A
on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (例如 6.12.85)'
        required: true
        default: '6.12.85'
      board:
        description: '设备型号 (例如 s905l3a)'
        required: true
        default: 's905l3a'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取代码（最关键的一步）
      - name: Checkout
        uses: actions/checkout@v4

      # 第二步：随便装个工具测试一下环境
      - name: Test Env
        run: |
          echo "Node版本: $(node -v)"
          echo "清理旧文件..."
          rm -rf amlogic-s9xxx-armbian
          echo "开始克隆编译脚本..."
          git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-armbian.git
