name: Build S905L3A RT Kernel
run-name: RT-Kernel-${{ github.run_id }}

# 强制使用 Node.js 24（修复弃用错误）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      kernel_ver:
        description: 'Kernel version (match your system)'
        required: true
        default: '6.12.85'
      kernel_type:
        description: 'Kernel type (rt)'
        required: true
        default: 'rt'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git curl xz-utils \
            gcc-aarch64-linux-gnu bc bison flex libssl-dev \
            make device-tree-compiler u-boot-tools

      - name: Clone ophub scripts
        run: |
          git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-armbian.git
          chmod +x amlogic-s9xxx-armbian/compile-kernel.sh

      - name: Compile RT Kernel for S905L3A
        run: |
          cd amlogic-s9xxx-armbian
          ./compile-kernel.sh \
            --kernel ${{ github.event.inputs.kernel_ver }} \
            --kernel-type ${{ github.event.inputs.kernel_type }} \
            --board s905l3a \
            --repo-url https://github.com/ophub/kernel.git

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s905l3a-rt-kernel
          path: amlogic-s9xxx-armbian/output/*
          retention-days: 7
